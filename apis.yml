    name: Dog CEO API
    description: >
      REST API for retrieving random and breed-specific dog images from a
      database of 20,000+ photos spanning 120+ breeds and sub-breeds. Supports
      random image selection, full breed listings, breed-specific image queries,
      and sub-breed queries. Returns JSON with CDN-hosted image URLs.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
