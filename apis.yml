aid: dog-ceo
name: Dog CEO
description: >
  Free REST API providing random dog images organized by breed and sub-breed
  from 120+ breeds. Backed by the Stanford Dogs Dataset and community-contributed
  photos, Dog CEO is widely used for learning HTTP concepts, API integration
  practice, and building dog-related applications. No authentication or API key
  is required. All endpoints return JSON with image URLs served via Vultr CDN.
  Open-source under the MIT license and community-funded via voluntary donations.
